name: Deploy to ECS

on:
  push:
    branches: [main]

env:
  AWS_REGION: us-east-1
  ECR_FRONTEND: tienda-perritos-frontend
  ECR_BACKEND: tienda-perritos-backend
  ECR_DB: tienda-perritos-db
  ECS_CLUSTER: tienda-perritos-cluster
  ECS_SERVICE_FRONTEND: frontend-service
  ECS_SERVICE_BACKEND: backend-service

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build & push frontend
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $REGISTRY/$ECR_FRONTEND:latest -t $REGISTRY/$ECR_FRONTEND:${{ github.sha }} ./frontend
          docker push $REGISTRY/$ECR_FRONTEND --all-tags

      - name: Build & push backend
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $REGISTRY/$ECR_BACKEND:latest -t $REGISTRY/$ECR_BACKEND:${{ github.sha }} ./backend
          docker push $REGISTRY/$ECR_BACKEND --all-tags

      - name: Build & push db
        env:
          REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          docker build -t $REGISTRY/$ECR_DB:latest -t $REGISTRY/$ECR_DB:${{ github.sha }} ./db
          docker push $REGISTRY/$ECR_DB --all-tags

      - name: Register frontend task
        run: |
          aws ecs register-task-definition --cli-input-json file://infrastructure/task-frontend.json

      - name: Register backend task
        run: |
          aws ecs register-task-definition --cli-input-json file://infrastructure/task-backend-db.json

      - name: Update ECS services
        run: |
          aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE_FRONTEND --force-new-deployment
          aws ecs update-service --cluster $ECS_CLUSTER --service $ECS_SERVICE_BACKEND --force-new-deployment

      - name: Wait for deployment
        run: |
          aws ecs wait services-stable --cluster $ECS_CLUSTER --services $ECS_SERVICE_FRONTEND $ECS_SERVICE_BACKEND
